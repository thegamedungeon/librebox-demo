name: Path Snitcher
on:
  push:
  workflow_dispatch:

jobs:
  snitch-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout The Crib
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Hunter-Seeker Protocol
        run: |
          echo "RAMCYCLE ENGINE: SCANNING FOR CORE FILES..."
          
          # We clear the file first so Daimyan can't fill it with junk
          echo "--- RAMCYCLE SEARCH LOG ---" > path.txt
          
          # Find the JS file and append it
          JS_FIND=$(find . -name "librebox.js" | sed 's|^\./||')
          if [ -z "$JS_FIND" ]; then
            echo "librebox.js: NOT FOUND" >> path.txt
          else
            echo "JS_PATH: $JS_FIND" >> path.txt
          fi
          
          # Find the WASM file and append it
          WASM_FIND=$(find . -name "librebox.wasm" | sed 's|^\./||')
          if [ -z "$WASM_FIND" ]; then
            echo "librebox.wasm: NOT FOUND" >> path.txt
          else
            echo "WASM_PATH: $WASM_FIND" >> path.txt
          fi
          
          echo "SCAN COMPLETE. REPORTING TO THE CRIB."

      - name: Deploy Intel to Repo
        run: |
          git config --global user.name "Ramcycle-Bot"
          git config --global user.email "bot@ramcycle.com"
          git add path.txt
          # The '|| exit 0' makes sure we don't get an Exit Code 1 if nothing changed
          git commit -m "Scout reported new coordinates for Ramcycle" || exit 0
          git push
