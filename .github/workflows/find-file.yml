- name: Hunt for the Target (Easy Mode)
        run: |
          # We simplify the search to avoid piping errors
          echo "Scanning all folders..."
          
          # This will list the path if it exists, or do nothing if it doesn't
          FOUND=$(find . -name "librebox.js" -print -quit)

          if [ -z "$FOUND" ]; then
            echo "RESULT: File Not Found"
            exit 1
          else
            # We use 'readlink' to get the clean absolute path
            CLEAN_PATH=$(echo $FOUND | sed 's|^\./||')
            echo "----------------------------------------"
            echo "SUCCESS: Found it!"
            echo "PATH: $CLEAN_PATH"
            echo "----------------------------------------"
          fi
